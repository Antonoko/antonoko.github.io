<body>
    <div class="container">
        <div class="main-text">
时间不等人，随着年龄的增长，更能深入理解时间的现实与虚幻。<br>
          生活给我们带来了各种各样的转折和挑战，<br>
          但我认为我们的目标之一应该是以雅致得体的态度去走完生命之路。 <br>
          在我人生中的这个特别时刻，万事停滞不前，<br>
          给予了我充分的时间去反思过去、认真思考眼前的一切，<br>
          并幻想未来。<br>
        </div>

    </div>
